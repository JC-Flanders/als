schema: als-language-upgrade-recipe@1
from:
  als_version: 2
to:
  als_version: 3
summary: Rewrite authored entrypoints to ALS-reserved authoring imports, remove the legacy authoring shim, and flip the system to ALS v3.
steps:
  - id: rewrite-authoring-contract
    title: Rewrite authored entrypoints to the ALS v3 authoring contract
    type: script
    category: must-run
    depends_on: []
    preconditions:
      - als-version-matches-from
      - validates-as-from-version
    postconditions:
      - als-version-matches-to
      - validates-as-to-version
    trigger: auto
    path: scripts/rewrite-authoring-contract.sh
    args: []
